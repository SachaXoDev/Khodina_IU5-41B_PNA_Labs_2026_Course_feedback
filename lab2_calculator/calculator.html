<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <link rel="stylesheet" href="styles.css">
  <script type="text/javascript" src="script.js"></script>
</head>

<body>

  <div class="header">
    <div class="container">
      <h1>Калькулятор</h1>
      <div class="header-buttons">
        <button class="btn btn-primary" onclick="location.reload()">Обновить</button>
      </div>
    </div>
  </div>

  <div class="calculator">
    <div class="calculator_body">

      <div id="result" class="result">
        0
      </div>

      <!-- блок с кнопками калькулятора -->
      <div class="buttons-grid">
        <div class="buttons-row">
          <button id="btn_op_clear" class="my-btn secondary clear">C</button>
          <button id="btn_op_sign" class="my-btn secondary">+/-</button>
          <button id="btn_op_percent" class="my-btn secondary">%</button>
          <button id="btn_op_div" class="my-btn secondary">/</button>
        </div>

        <div class="buttons-row">
          <button id="btn_digit_7" class="my-btn primary">7</button>
          <button id="btn_digit_8" class="my-btn primary">8</button>
          <button id="btn_digit_9" class="my-btn primary">9</button>
          <button id="btn_op_mult" class="my-btn secondary">×</button>
        </div>

        <div class="buttons-row">
          <button id="btn_digit_4" class="my-btn primary">4</button>
          <button id="btn_digit_5" class="my-btn primary">5</button>
          <button id="btn_digit_6" class="my-btn primary">6</button>
          <button id="btn_op_minus" class="my-btn secondary">-</button>
        </div>

        <div class="buttons-row">
          <button id="btn_digit_1" class="my-btn primary">1</button>
          <button id="btn_digit_2" class="my-btn primary">2</button>
          <button id="btn_digit_3" class="my-btn primary">3</button>
          <button id="btn_op_plus" class="my-btn secondary">+</button>
        </div>

        <div class="buttons-row">
          <button id="btn_digit_0" class="my-btn primary">0</button>
          <button id="btn_digit_dot" class="my-btn primary">.</button>
          <button id="btn_op_stddev" class="my-btn secondary">σ</button>
          <button id="btn_op_equal" class="my-btn execute">=</button>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
